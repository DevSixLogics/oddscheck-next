# CI for the Next.js app. NOTE: GitHub only runs workflows from `.github/workflows`
# at the REPOSITORY ROOT. If `oddscheck-next/` is not the repo root, move this file
# to <repo-root>/.github/workflows/ci.yml and keep the `working-directory` below.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

defaults:
  run:
    working-directory: oddscheck-next

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: oddscheck-next/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://oddscheck.com

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: oddscheck-next/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: "true"
